---
controller_credential_types:
  - name: "cisco-aci"
    description: ""
    kind: "cloud"
    inputs:
      fields:
      - id: username
        type: string
        label: APIC Username
        secret: false
      - id: password
        type: string
        label: APIC Password
        secret: true
    injectors:
      env:
        ACI_PASSWORD: !unsafe '{{ password }}'
        ACI_USERNAME: !unsafe '{{ username }}'

  - name: "servicenow-instance"
    description: ""
    kind: "cloud"
    inputs:
      fields:
      - id: sn_host
        type: string
        label: SN Host
        secret: false
      - id: sn_username
        type: string
        label: SN Username
        secret: false
      - id: sn_password
        type: string
        label: SN Password
        secret: true
    injectors:
      env:
        SN_HOST: !unsafe '{{ sn_host }}'
        SN_PASSWORD: !unsafe '{{ sn_password }}'
        SN_USERNAME: !unsafe '{{ sn_username }}'

  - name: "github pat avd-aap"
    description: ""
    kind: "cloud"
    inputs:
      fields:
      - id: github_pat
        type: string
        label: GitHub PAT
        secret: true
    injectors:
      env:
        GITHUB_PAT: !unsafe '{{ github_pat }}'

  - name: "Infoblox Portal"
    description: ""
    kind: "cloud"
    inputs:
      fields:
      - id: infoblox_portal_api_key
        type: string
        label: Infoblox Portal API Key
        secret: false
      - id: infoblox_portal_url
        type: string
        label: Infoblox Portal URL
        secret: true
    injectors:
      env:
        INFOBLOX_PORTAL_KEY: !unsafe '{{ infoblox_portal_api_key }}'
        INFOBLOX_PORTAL_URL: !unsafe '{{ infoblox_portal_url }}'

  - name: "panos"
    description: ""
    kind: "cloud"
    inputs:
      fields:
      - id: panos_username
        type: string
        label: PAN-OS Username
        secret: false
      - id: panos_password
        type: string
        label: PAN-OS Password
        secret: true
    injectors:
      extra_vars:
        panos_username: !unsafe '{{ panos_username }}'
        panos_password: !unsafe '{{ panos_password }}'
