---
controller_credentials:
  - name: aap.rh.lab
    organization: "Default" 
    credential_type: Machine
    inputs:
      username: mzdyb
      password: "{{ controller_secrets['aap.rh.lab']['password'] }}"

  - name: "Demo Credential"
    organization: "Default" 
    credential_type: "Machine"
    inputs:
      username: admin

  - name: servicenow-instance
    organization: "Default" 
    credential_type: servicenow-instance
    inputs:
      sn_username: admin
      sn_host: https://dev258388.service-now.com
      sn_password: "{{ controller_secrets['servicenow-instance']['password'] }}"

  - name: "EDA for networks Arista credentials"
    organization: "Default" 
    credential_type: "Machine"
    inputs:
      username: admin
      password: "{{ controller_secrets['eda_arista']['password'] }}"

  - name: "sandboxapicdc.cisco.com"
    organization: "Default" 
    credential_type: "cisco-aci"
    inputs:
      username: admin
      password: "{{ controller_secrets['sandboxapicdc']['password'] }}"

  - name: "github pat avd-aap"
    organization: "Default" 
    credential_type: "github pat avd-aap"
    inputs:
      github_pat: "{{ avd_aap.github_pat }}"

  - name: "registry.redhat.io"
    organization: "Default" 
    credential_type: "Container Registry"
    inputs:
      host: "https://registry.redhat.io"
      username: "{{ registry_redhat_io_username }}"
      password: "{{ registry_redhat_io_password }}"
      verify_ssl: true

  - name: "github pat"
    organization: "Default" 
    credential_type: "GitHub Personal Access Token"
    inputs:
      token: "{{ github_pat }}"

  - name: "Infoblox Portal"
    organization: "Default" 
    credential_type: "Infoblox Portal"
    inputs:
      infoblox_portal_url: "https://csp.infoblox.com"
      infoblox_portal_api_key: "{{ infoblox_portal_api_key }}"


  