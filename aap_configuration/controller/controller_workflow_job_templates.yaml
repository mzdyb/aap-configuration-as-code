---
controller_workflows:
  - name: "EDA for networks - interface status change"
    organization: "Default"
    state: "present"
    ask_variables_on_launch: "True"
    ask_limit_on_launch: true
    notification_templates_started:
      - "network-events slack channel"
    notification_templates_success:
      - "network-events slack channel"
    notification_templates_error:
      - "network-events slack channel"
    simplified_workflow_nodes:
      - identifier: "create incident"
        unified_job_template: "EDA for networks - create incident"
        all_parents_must_converge: "False"
        success_nodes:
          - interface recovery
      - identifier: "interface recovery"
        unified_job_template: "EDA for networks - interface recovery"
        all_parents_must_converge: "False"
        success_nodes:
          - update&close incident
        failure_nodes:
          - update incident
      - identifier: "update incident"
        unified_job_template: "EDA for networks - update incident"
        all_parents_must_converge: "False"
      - identifier: "update&close incident"
        unified_job_template: "EDA for networks - update and close incident"
        all_parents_must_converge: "False"

  - name: "EDA for networks - bgp network prefix configuration change"
    organization: "Default"
    state: "present"
    ask_variables_on_launch: "True"
    ask_limit_on_launch: true
    notification_templates_started:
      - "network-events slack channel"
    notification_templates_success:
      - "network-events slack channel"
    notification_templates_error:
      - "network-events slack channel"
    simplified_workflow_nodes:
      - identifier: "create incident"
        unified_job_template: "EDA for networks - create incident"
        all_parents_must_converge: "False"
        success_nodes:
          - enforce SoT config
      - identifier: "enforce SoT config"
        unified_job_template: "EDA for networks - enforce configuration from SoT"
        all_parents_must_converge: "False"
        success_nodes:
          - update&close incident
        failure_nodes:
          - update incident
      - identifier: "update&close incident"
        unified_job_template: "EDA for networks - update and close incident"
        all_parents_must_converge: "False"
      - identifier: "update incident"
        unified_job_template: "EDA for networks - update incident"
        all_parents_must_converge: "False"

  - name: "paloalto - provision firewall"
    organization: "Default"
    state: "present"
    inventory: "paloalto inventory"
    simplified_workflow_nodes:
      - identifier: "configure network"
        unified_job_template: "paloalto - configure network"
        success_nodes:
          - configure security policies
      - identifier: "configure security policies"
        unified_job_template: "paloalto - configure security policies"
        success_nodes:
          - commit configuration
      - identifier: "commit configuration"
        unified_job_template: "paloalto - commit configuration"
        success_nodes:
          - show info
      - identifier: "show info"
        unified_job_template: "paloalto - show info"

  - name: "paloalto - deprovision firewall"
    organization: "Default"
    state: "present"
    inventory: "paloalto inventory"
    simplified_workflow_nodes:
      - identifier: "backup configuration"
        unified_job_template: "paloalto - backup configuration"
        success_nodes:
          - remove security policies
      - identifier: "remove security policies"
        unified_job_template: "paloalto - configure security policies"
        extra_data:
          fw_rules_state: absent
        success_nodes:
          - remove network configuration
      - identifier: "remove network configuration"
        unified_job_template: "paloalto - configure network"
        extra_data:
          fw_config_state: absent
        success_nodes:
          - commit configuration
      - identifier: "commit configuration"
        unified_job_template: "paloalto - commit configuration"

  - name: "paloalto - day 2 configuration change"
    organization: "Default"
    state: "present"
    inventory: "paloalto inventory"
    simplified_workflow_nodes:
      - identifier: "backup configuration"
        unified_job_template: "paloalto - backup configuration"
        success_nodes:
          - configure network
      - identifier: "configure network"
        unified_job_template: "paloalto - configure network"
        success_nodes:
          - configure security policies
      - identifier: "configure security policies"
        unified_job_template: "paloalto - configure security policies"
        success_nodes:
          - commit configuration
      - identifier: "commit configuration"
        unified_job_template: "paloalto - commit configuration"
        success_nodes:
          - detect drift
      - identifier: "detect drift"
        unified_job_template: "paloalto - detect drift"

  - name: "paloalto - drift detection and remediation"
    organization: "Default"
    state: "present"
    inventory: "paloalto inventory"
    simplified_workflow_nodes:
      - identifier: "detect drift"
        unified_job_template: "paloalto - detect drift"
        failure_nodes:
          - approve remediation
      - identifier: "approve remediation"
        approval_node:
          name: "Approve drift remediation"
          description: "Review the drift report. Approve to proceed with remediation."
          timeout: 0
        success_nodes:
          - remediate drift
      - identifier: "remediate drift"
        unified_job_template: "paloalto - remediate drift"

  - name: "cisco aci - configure aci"
    organization: "Default"
    state: "present"
    simplified_workflow_nodes:
      - identifier: "synchronize SoT"
        unified_job_template: "cisco-aci"
        all_parents_must_converge: "False"
        success_nodes:
          - configure network objects
      - identifier: "configure network objects"
        unified_job_template: "cisco aci - configure network objects"
        all_parents_must_converge: "False"
        success_nodes:
          - configure APs & EPGs
        failure_nodes:
          - some action if failed
      - identifier: "some action if failed"
        unified_job_template: "Demo Job Template"
        all_parents_must_converge: "False"
      - identifier: "configure APs & EPGs"
        unified_job_template: "cisco aci - configure APs and EPGs"
        all_parents_must_converge: "False"
        success_nodes:
          - configure filters
        failure_nodes:
          - another action if failed
      - identifier: "another action if failed"
        unified_job_template: "Demo Job Template"
        all_parents_must_converge: "False"
      - identifier: "configure filters"
        unified_job_template: "cisco aci - configure filters"
        all_parents_must_converge: "False"
        success_nodes:
          - configure contracts
      - identifier: "configure contracts"
        unified_job_template: "cisco aci - configure contracts"
        all_parents_must_converge: "False"

  - name: "checkpoint - manage configuration"
    organization: "Default"
    state: "present"
    simplified_workflow_nodes:
      - identifier: "create objects"
        unified_job_template: "checkpoint - manage objects"
        all_parents_must_converge: "False"
        success_nodes:
          - create access rules
      - identifier: "create access rules"
        unified_job_template: "checkpoint - manage access rules"
        all_parents_must_converge: "False"
        success_nodes:
          - install policies
      - identifier: "install policies"
        unified_job_template: "checkpoint - install policies"
        all_parents_must_converge: "False"

  - name: F5 BIG IP - configure infrastructure
    organization: Default
    state: present
    survey_enabled: true
    survey:
      name: ''
      description: ''
      spec:
        - question_name: Provide license key
          variable: license_key
          type: text
          required: false
          default: ''
          min: 0
          max: 1024
        - question_name: Do you want to enable persistence profile? (true/false)
          variable: persistence_enabled
          type: multiplechoice
          required: true
          default: 'false'
          choices:
            - 'true'
            - 'false'
    simplified_workflow_nodes:
      - identifier: F5 initial config
        all_parents_must_converge: false
        unified_job_template: F5 BIG IP - initial configuration
        success_nodes:
          - load balancing config
      - identifier: load balancing config
        all_parents_must_converge: false
        unified_job_template: F5 BIG IP - configure load balancing
      - identifier: provision web servers
        all_parents_must_converge: false
        unified_job_template: F5 BIG IP - provision web servers

  - name: "Arista AVD - build, deploy and validate operational states"
    organization: "Default"
    state: "present"
    webhook_service: 'github'
    simplified_workflow_nodes:
      - identifier: "build and deploy configuration"
        unified_job_template: "Arista AVD - build and deploy configuration"
        all_parents_must_converge: "False"
        success_nodes:
          - validate operational states
      - identifier: "validate operational states"
        unified_job_template: "Arista AVD - validate devices operational states"
        all_parents_must_converge: "False"


  - name: "Network CaC - deploy configuration with Network Resource modules workflow"
    organization: "Default"
    state: "present"
    webhook_service: 'github'
    simplified_workflow_nodes:
      - identifier: "synchronize SoT"
        unified_job_template: "network-cac"
        all_parents_must_converge: "False"
        success_nodes:
          - deploy configuration
      - identifier: "deploy configuration"
        unified_job_template: "Network CaC - deploy configuration with Network Resource modules"
        all_parents_must_converge: "False"

  - name: "Network CaC - deploy configuration with Config modules workflow"
    organization: "Default"
    state: "present"
    webhook_service: 'github'
    simplified_workflow_nodes:
      - identifier: "synchronize SoT"
        unified_job_template: "network-cac"
        all_parents_must_converge: "False"
        success_nodes:
          - deploy configuration
      - identifier: "deploy configuration"
        unified_job_template: "Network CaC - deploy configuration with Config modules"
        all_parents_must_converge: "False"

  - name: "infoblox - DDI infrastructure workflow"
    organization: "Default"
    state: "present"
    webhook_service: 'github'
    simplified_workflow_nodes:
      - identifier: "synchronize repository"
        unified_job_template: "infoblox"
        all_parents_must_converge: "False"
        success_nodes:
          - setup infrastructure
      - identifier: "synchronize inventory"
        unified_job_template: "infoblox source"
        all_parents_must_converge: "False"
        success_nodes:
          - setup infrastructure
      - identifier: "setup infrastructure"
        unified_job_template: "infoblox - setup infrastructure"
        all_parents_must_converge: "True"
        success_nodes:
          - verify infrastructure
      - identifier: "verify infrastructure"
        unified_job_template: "infoblox - verify infrastructure"
        all_parents_must_converge: "False"

  - name: "infoblox - DDI workload workflow"
    organization: "Default"
    state: "present"
    webhook_service: 'github'
    simplified_workflow_nodes:
      - identifier: "synchronize repository"
        unified_job_template: "infoblox"
        all_parents_must_converge: "False"
        success_nodes:
          - provision workloads
      - identifier: "synchronize inventory"
        unified_job_template: "infoblox source"
        all_parents_must_converge: "False"
        success_nodes:
          - provision workloads
      - identifier: "provision workloads"
        unified_job_template: "infoblox - provision workloads"
        all_parents_must_converge: "True"
        success_nodes:
          - verify workloads
      - identifier: "verify workloads"
        unified_job_template: "infoblox - verify workloads"
        all_parents_must_converge: "False"
